name: CI/CD Frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t lucianodelgado/innovatech-frontend:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push lucianodelgado/innovatech-frontend:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull lucianodelgado/innovatech-frontend:latest
            docker stop innovatech-frontend || true
            docker rm innovatech-frontend || true
            docker run -d \
              --name innovatech-frontend \
              -p 80:80 \
              lucianodelgado/innovatech-frontend:latest